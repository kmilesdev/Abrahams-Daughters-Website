<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donation Cancelled | Abraham's Daughters</title>
  <meta name="description" content="Your donation was cancelled. You can try again anytime.">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body>
  <header class="header" id="header">
    <div class="container header-container">
      <a href="/" class="logo">
        <img src="/images/logo.png" alt="Abraham's Daughters Logo">
        <span class="logo-text">Abraham's Daughters</span>
      </a>
      <nav class="nav" id="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/about.html" class="nav-link">About Us</a>
        <a href="/team.html" class="nav-link">Meet the Team</a>
        <a href="/gallery.html" class="nav-link">Gallery</a>
        <a href="/events.html" class="nav-link">Events</a>
        <a href="/donate.html" class="nav-link active">Donate</a>
      </nav>
      <div class="header-actions">
        <a href="/#contact" class="btn btn-primary">Contact Us</a>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="donate-result-section">
      <div class="container">
        <div class="donate-result-card donate-result-cancel" data-testid="donate-cancel-card">
          <div class="donate-result-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          </div>
          <h1 data-testid="text-cancel-title">Donation Cancelled</h1>
          <p class="donate-result-message" data-testid="text-cancel-message">No worries — your card has not been charged. You can try again whenever you're ready.</p>
          <div class="donate-result-actions">
            <a href="/donate.html" class="btn btn-primary" data-testid="link-try-again">Try Again</a>
            <a href="/" class="btn btn-secondary" data-testid="link-back-home">Back to Home</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 Abraham's Daughters. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
</body>
</html>
